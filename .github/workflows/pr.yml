name: PR

on:
  pull_request_target:
    types: [opened, reopened, edited, closed]

jobs:
  block-ai:
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const pullRequest = context.payload.pull_request;
            const authorAssociation = pullRequest.author_association ?? (
              await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullRequest.number,
              })
            ).data.author_association;

            if (authorAssociation !== 'FIRST_TIME_CONTRIBUTOR') return;

            const body = pullRequest.body ?? '';
            const isAi = /build:typescript|Verification|Validation/.test(body);
            if (!isAi) return;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullRequest.number,
              state: 'closed',
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              body: "You're allowed to open PRs only if you post a screenshot of your working PR. Untested AI PRs are NOT welcome here and you will get blocked.",
            });

  reminder:
    name: Label Reminder
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if PR has no labels
        id: check
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const labels = context.payload.pull_request.labels;
            return labels.length === 0;

      - name: Post comment if unlabeled
        if: steps.check.outputs.result == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: 'To maintainers: Please add labels to this PR'

  Sync:
    if: github.event.pull_request.state == 'open'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: read
      contents: read
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const allowed = ['bug', 'enhancement', 'meta']
            const { owner, repo } = context.repo
            const pr = context.payload.pull_request

            const query = `
              query($owner:String!, $repo:String!, $number:Int!) {
                repository(owner:$owner, name:$repo) {
                  pullRequest(number:$number) {
                    closingIssuesReferences(first: 10) {
                      nodes {
                        labels(first: 20) {
                          nodes { name }
                        }
                      }
                    }
                  }
                }
              }
            `

            const res = await github.graphql(query, {
              owner, repo, number: pr.number
            })

            const labels = new Set()
            for (const issue of res.repository.pullRequest.closingIssuesReferences.nodes) {
              for (const l of issue.labels.nodes) {
                if (allowed.includes(l.name)) labels.add(l.name)
              }
            }

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: [...labels]
              })
            }
