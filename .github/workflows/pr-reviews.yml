name: PR Reviews

on:
  pull_request_review:
    types: [submitted]

jobs:
  block:
    if: github.event.review.state == 'approved' && github.event.pull_request.state == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.ORG_ADMIN_TOKEN }}
          script: |
            await github.rest.orgs.blockUser({
              org: context.repo.owner,
              username: context.payload.review.user.login,
            });
