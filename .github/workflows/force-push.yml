name: Notify force-push

on:
  pull_request_target:
    types: [synchronize]

# To show this comment only once per user across all PRs, you could:
# 1. Search existing PR comments for a previous warning to the same user:
#    Use `github.rest.issues.listComments` across recent PRs to find prior warnings.
# 2. Maintain a plain-text allowlist file (e.g. `.github/warned-users.txt`) in the
#    repository. When a warning is posted, open a PR/commit adding the user to the
#    file; on future force-pushes, check the file before commenting.
# 3. Use a dedicated tracking issue whose body or comments list warned usernames.
#    Look up the user before posting and skip if already listed.

jobs:
  notify:
    name: Notify on force push
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if force push
        id: check
        uses: actions/github-script@v8
        with:
          result-encoding: string
          script: |
            const { before, after } = context.payload;

            // A null/zero SHA means the branch was just created — not a force push
            if (!before || before === '0000000000000000000000000000000000000000') {
              return 'false';
            }

            try {
              const { data } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: before,
                head: after,
              });
              // A regular push makes `after` a direct descendant of `before` (status
              // "ahead"). Any other status means history was rewritten (force push).
              return String(data.status !== 'ahead' && data.status !== 'identical');
            } catch {
              return 'false';
            }

      - name: Leave comment
        if: steps.check.outputs.result == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            Please avoid force-pushing to this PR. It makes it harder for reviewers to track what changed since the last review.

            Just push new commits on top of the branch instead — PRs are squashed on merge, so the commit history doesn't need to be clean.
