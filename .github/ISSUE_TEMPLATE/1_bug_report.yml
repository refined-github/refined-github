name: 🐛 Report a bug
description: ———
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        # Thanks for reporting a bug! ⛰

        Help us replicate the issue by filling in this form. You can use the "Identify feature" button in the options page to find which feature is causing the issue.

        Please ensure:

        - The bug is caused by Rough GitHub. It doesn't happen if I disable the extension.
        - The bug happens after clearing the extension cache. The "Clear cache" button can be found in the "Debug" tab of the options page. [](#clear-cache)

        Include in this issue:

        - Screenshots/video/gif demonstrating the bug, if it’s visual
        - Console errors, if any

  - id: description
    type: textarea
    attributes:
      label: Description
    validations:
      required: true
  - id: repro
    type: textarea
    attributes:
      label: How to replicate the issue + URL
      description: ‼️‼️‼️ Every bug report MUST include A REAL URL where the bug appears. If it happens on a private repo, find an equivalent public URL, even if it doesn't happen there.
    validations:
      required: true
  - id: version
    type: input
    attributes:
      label: Extension version
    validations:
      required: true
  - id: browser
    type: input
    attributes:
      label: Browser(s) used
    validations:
      required: true
  - id: token
    type: checkboxes
    attributes:
      label: Token ⚠️
      options:
        - label: I set a token in the options page. I understand that some features require a token to work.
          required: true
