query GetPublishRepoState($owner: String!, $name: String!) {
	repository(owner: $owner, name: $name) {
		refs(
			first: 20
			refPrefix: "refs/tags/"
			orderBy: { field: TAG_COMMIT_DATE, direction: DESC }
		) {
			nodes {
				name
				tag: target {
					... on Tag {
						commit: target {
							... on Commit {
								history {
									totalCount
								}
							}
						}
					}
					... on Commit {
						history {
							totalCount
						}
					}
				}
			}
		}
		defaultBranchRef {
			target {
				... on Commit {
					history {
						totalCount
					}
				}
			}
		}
	}
}
