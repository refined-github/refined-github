query GetRepositoryInfo($owner: String!, $name: String!) {
	repository(owner: $owner, name: $name) {
		stargazerCount
		isPrivate
		viewerHasStarred
		isEmpty
		forked: parent {
			url
		}
		defaultBranchRef {
			target {
				... on Commit {
					history(first: 3) {
						nodes {
							oid
							statusCheckRollup {
								state
							}
						}
					}
				}
			}
		}
	}
}
